<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FreJun — Network Calling</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 480px; margin: 40px auto; }
    input, button { display: block; width: 100%; padding: 10px; margin: 8px 0; box-sizing: border-box; font-size: 14px; }
    button { background: #4f46e5; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    pre { background: #f3f4f6; padding: 12px; border-radius: 6px; white-space: pre-wrap; font-size: 13px; }
  </style>
</head>
<body>
  <h2>Network Calling</h2>
  <p>2-legged phone flow — FreJun calls you first, then connects to the destination.</p>

  <button id="btn-auth">1. Login with FreJun</button>

  <fieldset id="call-form" disabled>
    <legend>2. Make a call</legend>
    <input id="user-email" type="email" placeholder="Your FreJun email" />
    <input id="candidate-number" type="tel" placeholder="Destination number (E.164, e.g. +919876543210)" />
    <input id="candidate-name" type="text" placeholder="Callee name (optional)" />
    <button id="btn-call" type="button">Call</button>
  </fieldset>

  <pre id="log"></pre>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
