<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FreJun — VoIP via Dialer Widget</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 520px; margin: 40px auto; }
    button { display: block; width: 100%; padding: 10px; margin: 8px 0; font-size: 14px; background: #46e578; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .widget-wrapper { position: fixed; bottom: 20px; right: 20px; width: 380px; height: 600px; border: 1px solid #e5e7eb; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.12); display: none; background: #fff; }
    .widget-wrapper iframe { width: 100%; height: 100%; border: none; }
    pre { background: #f3f4f6; padding: 12px; border-radius: 6px; white-space: pre-wrap; font-size: 13px; }
  </style>
</head>
<body>
  <h2>VoIP Calling — Dialer Widget (iframe)</h2>
  <p>Embeds FreJun's dialer as an iframe. The widget handles the softphone, call UI, and session management.</p>

  <button id="btn-auth">1. Login with FreJun</button>
  <button id="btn-widget" disabled>2. Open Dialer Widget</button>

  <pre id="log"></pre>

  <div class="widget-wrapper" id="widget-wrapper">
    <iframe id="dialer-iframe"></iframe>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
