<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FreJun — VoIP via Web SDK</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 520px; margin: 40px auto; }
    input, button { display: block; width: 100%; padding: 10px; margin: 6px 0; box-sizing: border-box; font-size: 14px; }
    button { background: #46e578; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .call-controls { display: flex; gap: 6px; flex-wrap: wrap; }
    .call-controls button { width: auto; flex: 1; }
    pre { background: #f3f4f6; padding: 12px; border-radius: 6px; white-space: pre-wrap; font-size: 13px; max-height: 300px; overflow-y: auto; }
    .status { padding: 8px; border-radius: 6px; margin: 8px 0; font-weight: 600; }
    .status.idle { background: #e5e7eb; }
    .status.registered { background: #d1fae5; }
    .status.ringing { background: #fef3c7; }
  </style>
</head>
<body>
  <h2>VoIP Calling — Softphone Web SDK</h2>

  <audio id="sip-local-audio" controls style="display:none;"></audio>
  <audio id="sip-remote-audio" autoplay controls style="display:none;"></audio>

  <button id="btn-auth">1. Login with FreJun</button>

  <fieldset id="phone-section" disabled>
    <legend>2. Softphone</legend>

    <div class="status idle" id="status">Idle</div>

    <input id="phone-number" type="tel" placeholder="Destination number (E.164, e.g. +919876543210)" />
    <input id="virtual-number" type="tel" placeholder="Virtual number (optional)" />
    <button id="btn-dial" type="button" disabled>Dial</button>

    <div class="call-controls">
      <button id="btn-accept" type="button" disabled>Accept</button>
      <button id="btn-end" type="button" disabled>End</button>
      <button id="btn-mute" type="button" disabled>Mute</button>
      <button id="btn-hold" type="button" disabled>Hold</button>
    </div>
  </fieldset>

  <pre id="log"></pre>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
